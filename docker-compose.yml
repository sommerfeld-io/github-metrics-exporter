---
x-volumes: &volumes
  - /etc/timezone:/etc/timezone:ro
  - /etc/localtime:/etc/localtime:ro
  - project-root-volume:/workspaces/github-metrics-exporter
x-workdir: &default-workdir /workspaces/github-metrics-exporter
x-tty: &tty true

volumes:

  project-root-volume:
    driver: local
    driver_opts:
      type: none
      device: .
      o: bind

services:

  lint-yaml:
    image: cytopia/yamllint:latest
    volumes: *volumes
    working_dir: *default-workdir
    command: .
    tty: *tty

  lint-workflows:
    image: rhysd/actionlint:latest
    volumes: *volumes
    working_dir: *default-workdir
    command: -color
    tty: *tty

  lint-filenames:
    image: lslintorg/ls-lint:1.11.2
    volumes: *volumes
    working_dir: *default-workdir
    tty: *tty

  lint-folders:
    image: sommerfeldio/folderslint:latest
    volumes: *volumes
    working_dir: *default-workdir
    command: .
    tty: *tty

  lint-markdown-links:
    image: lycheeverse/lychee:sha-a11d515-alpine
    volumes: *volumes
    working_dir: *default-workdir
    command: --config .lychee.toml .
    tty: *tty

  # go-lint:
  #   image: &golangci-lint-image golangci/golangci-lint:v2.12.2
  #   volumes: *volumes
  #   working_dir: *default-workdir-go
  #   command: &golangci-lint-cmd golangci-lint run -v
  #   tty: *tty

  lint-gherkin:
    image: node:23.3.0-alpine3.19
    volumes: *volumes
    working_dir: *default-workdir
    command:
      - /bin/ash
      - -c
      - npx --yes gherkin-lint src/acceptance-tests/features
    tty: *tty

  github-metrics-exporter-lint-dockerfile:
    image: &lint-dockerfile-image hadolint/hadolint:latest
    volumes: *volumes
    working_dir: *default-workdir
    entrypoint: hadolint Dockerfile

  github-metrics-exporter:
    image: ${COMPOSE_PROJECT_NAME}-app:${DEV_TAG}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 9400:9400
    volumes:
      - ./src/ghme-config.yml:/opt/ghme/ghme-config.yml:ro
    depends_on:
      github-metrics-exporter-lint-dockerfile:
        condition: service_completed_successfully
