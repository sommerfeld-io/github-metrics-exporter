---
name: "Scan Container Images"

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

env:
  IMAGE_TAG_EDGE: ${{ vars.IMAGE_TAG_EDGE }}
  IMAGE_TAG_LATEST: ${{ vars.IMAGE_TAG_LATEST }}
  REGISTRY: docker.io
  image-name: github-metrics-exporter
  context: '.'

permissions:
  contents: read
  security-events: write

jobs:

  docker-scout:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "job_date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Scout - CVE Scan
        uses: docker/scout-action@v1.21.0
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USER }}/${{ env.image-name }}:${{ env.IMAGE_TAG_LATEST }}
          sarif-file: sarif-output.json
          summary: false
          organization: ${{ secrets.DOCKERHUB_USER }}
      - name: Upload SARIF result
        id: upload-sarif
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-output.json
          category: 'Docker Scout CVEs - ${{ secrets.DOCKERHUB_USER }}/${{ env.image-name }}:${{ env.IMAGE_TAG_LATEST }}'
          checkout_path: components/${{ env.image-name }}
