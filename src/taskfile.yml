---
version: '3.42.1'

vars:
  BINARY_NAME: github-metrics-exporter
  GO_PATH: PATH=$(go env GOPATH)/bin:$PATH

tasks:

  cleanup:
    desc: Clean Go build artifacts
    dir: &dir '{{.TASKFILE_DIR}}'
    cmds:
      - rm -rf {{ .BINARY_NAME }}

  lint:
    desc: Run golangci-lint to check code quality
    dir: *dir
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      # - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - "{{ .GO_PATH }} golangci-lint run --timeout 5m"

  complexity:
    desc: Run gocyclo to check code complexity
    dir: *dir
    vars:
      COMPLEXITY_LIMIT: 10
    cmds:
      - go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
      - "{{ .GO_PATH }} gocyclo -over {{ .COMPLEXITY_LIMIT }} ."

  licenses:
    desc: Check Go licenses
    dir: *dir
    vars:
      MODULE: github.com/sommerfeld-io/github-metrics-exporter
      ALLOWED_LICENSES: "MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,Unlicense"
    cmds:
      - go install github.com/google/go-licenses@latest
      - "{{ .GO_PATH }} go-licenses check --include_tests --ignore {{ .MODULE }} --allowed_licenses {{ .ALLOWED_LICENSES }} {{ .MODULE }}"
      - "{{ .GO_PATH }} go-licenses report --include_tests --ignore {{ .MODULE }} {{ .MODULE }}"

  test:
    desc: Run unit tests with coverage report
    dir: *dir
    cmds:
      - go test -v -coverprofile=coverage.out ./internal/...
      - go tool cover -func=coverage.out

  build:
    desc: Test and build the {{ .BINARY_NAME }} binary with Go
    dir: *dir
    cmds:
      - task: cleanup
      - task: complexity
      - task: licenses
      - task: lint
      - go mod tidy
      - go fmt
      - go vet
      - task: test
      - task: test:acceptance
      - go build -ldflags "-X github.com/sommerfeld-io/github-metrics-exporter/internal/metrics.CommitSHA=$(git rev-parse HEAD)" -o {{ .BINARY_NAME }}

  test:acceptance:
    desc: Run GoDog acceptance tests for the exporter with end-to-end coverage of internal packages
    dir: *dir
    cmds:
      - go test -v -coverpkg=./internal/... -coverprofile=acceptance-coverage.out ./acceptance-tests/...
      - go tool cover -func=acceptance-coverage.out

  run:
    desc: Run the {{ .BINARY_NAME }} binary
    dir: *dir
    cmds:
      - task: build
      - ./{{ .BINARY_NAME }}
